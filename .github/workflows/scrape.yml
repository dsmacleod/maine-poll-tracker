name: Scrape and Publish Maine Poll Tracker

on:
  schedule:
    # 8 AM Eastern Time = 13:00 UTC (accounts for EDT; adjust to 12:00 in winter if desired)
    - cron: '0 13 * * *'
  workflow_dispatch:   # allows manual trigger from the Actions tab

permissions:
  contents: write      # needed to push index.html back to the repo

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push index.html if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          # Only commit if index.html actually changed
          if git diff --cached --quiet; then
            echo "No changes to index.html — nothing to commit."
          else
            git commit -m "chore: update poll data $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
